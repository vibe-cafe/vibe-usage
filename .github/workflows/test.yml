name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # 20 = engines floor (sqlite.js falls back to the sqlite3 CLI there),
        # 22 = first version with built-in node:sqlite.
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Zero dependencies — no install step needed, tests run against src/ directly.
      - run: npm test
